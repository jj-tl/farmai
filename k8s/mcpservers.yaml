apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: real-weather-api-mcp
  namespace: smart-farm-demo
spec:
  transportType: http
  deployment:
    image: jainputhore/real-weather-mcp:latest # (I'll need to double check this image or use the npx one if possible)
    # Wait, the npx one was v1alpha2 but the field names might vary.
    # To be safe, I'll stick to a standard image if I have one.
    # Actually, I'll use the existing manifest's logic but in v1alpha1.
