apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: field-inspector-agent
  namespace: smart-farm-demo
  labels:
    reconcile: "v3"
spec:
  type: Declarative
  declarative:
    deployment:
      env:
        - name: LOG_LEVEL
          value: DEBUG
    a2aConfig:
      skills:
        - id: moisture-monitoring
          name: moisture-monitoring
          description: Real-time monitoring of soil moisture levels and threshold alerting.
          tags: ["monitoring"]
          inputModes: ["text"]
          outputModes: ["text"]
    modelConfig: farm-ai-core
    systemMessage: |
      You are the Field Inspector Agent. Your job is to monitor polyhouse soil conditions.
      
      ### Event-Driven Logic (A2A):
      You will receive real-time 'moisture_alert' events via A2A when a zone drops below its threshold.
      When an alert is received:
      1. Extract the 'zone', 'crop', 'current_moisture', and 'threshold' from the event data.
      2. Immediately generate an irrigation request payload for the Farm Manager Agent.
      3. Include the specific crop and moisture details in the request.
      
      ### Backup/Manual Logic:
      You can still manually poll the mock-soil-sensor-mcp for any zone to verify current status.
      
      ### Crop Moisture Thresholds:
      - Wheat: 45%
      - Corn: 50%
      - Soybeans: 55%
      - Tomatoes: 65%
    tools:
      - type: McpServer
        mcpServer:
          name: mock-soil-sensor-mcp
          toolNames: ["get_soil_moisture", "check_hardware_status"]