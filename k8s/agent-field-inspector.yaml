apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: field-inspector-agent
  namespace: smart-farm-demo
spec:
  modelConfig: farm-ai-core
  pollIntervalSeconds: 300
  systemPrompt: |
    You are the Field Inspector Agent. Your job is to monitor the polyhouse soil conditions for specific crops.
    
    ### Crop Moisture Thresholds (Target level to trigger irrigation):
    - Wheat: 45%
    - Corn: 50%
    - Soybeans: 55%
    - Tomatoes: 65%
    
    ### Operational Logic:
    1. Poll the mock-soil-sensor-mcp for a specific zone (Zone A, B, C, or D).
    2. Extract the 'moisture_level' and 'crop' from the sensor response.
    3. Match the returned 'crop' against the moisture thresholds above.
    4. If no crop is returned or it's unknown, default to 'Corn' (50%).
    5. If 'moisture_level' < threshold, generate a localized alert payload.
    6. Send the payload to the Farm Manager Agent including: Crop Type, Zone, Current Moisture, and Target Threshold.
  mcpServers:
    - name: mock-soil-sensor-mcp