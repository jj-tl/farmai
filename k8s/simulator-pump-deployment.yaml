apiVersion: apps/v1
kind: Deployment
metadata:
  name: pump-actuator-simulator
  namespace: smart-farm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pump-actuator
  template:
    metadata:
      labels:
        app: pump-actuator
    spec:
      containers:
      - name: simulator
        image: mock-pump-mcp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: mock-pump-actuator-service
  namespace: smart-farm-demo
spec:
  selector:
    app: pump-actuator
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
